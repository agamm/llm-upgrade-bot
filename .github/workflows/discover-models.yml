name: Discover New Models
on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || 'main' }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Discover new models
        id: discover
        run: pnpm tsx scripts/discover-models.ts
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Classify new models
        if: steps.discover.outputs.has_new_models == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Current directory: /home/runner/work/llm-upgrade-bot/llm-upgrade-bot

            Read `.claude/skills/classifier.md` — it contains all classification rules. If the file is missing, STOP and fail with an error.

            Read `data/new-models.txt` for newly discovered model IDs.
            Read `data/families.json` for current model families.

            Follow the rules in classifier.md exactly. Edit families.json in place.
          claude_args: '--allowedTools "Read,Edit,Write,Bash(pnpm:*),WebSearch,WebFetch"'
          show_full_output: false

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/upgrades.json data/families.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/discover-models
          add-paths: |
            data/upgrades.json
            data/families.json
            .claude/skills/classifier.md
          title: 'chore: new LLM models discovered'
          body: |
            Automatically discovered and classified new LLM models.
            Review the changes to `data/families.json` and `data/upgrades.json`.

            If something looks wrong, comment `@claude <what's wrong and why>` — it will fix
            the PR and update `.claude/skills/classifier.md` with a generic rule for future runs.
          commit-message: 'chore: add newly discovered LLM models'
          delete-branch: true
