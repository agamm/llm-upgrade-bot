name: Discover New Models
on:
  schedule:
    - cron: '0 * * * *'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || 'main' }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Discover models
        run: pnpm tsx scripts/discover-models.ts
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Validate upgrades.json
        run: pnpm tsx scripts/validate-variants.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/upgrades.json data/families.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read report into variable
        if: steps.changes.outputs.has_changes == 'true'
        id: report
        run: echo "body<<REPORT_EOF" >> "$GITHUB_OUTPUT" && cat data/discovery-report.md >> "$GITHUB_OUTPUT" && echo "REPORT_EOF" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/discover-models
          add-paths: |
            data/upgrades.json
            data/families.json
          title: 'chore: new LLM models discovered'
          body: ${{ steps.report.outputs.body }}
          commit-message: 'chore: add newly discovered LLM models'
          delete-branch: true
